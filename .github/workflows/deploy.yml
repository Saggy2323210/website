name: Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Ubuntu server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            cd /home/${{ secrets.SERVER_USER }}/website

            # Pull latest code
            git pull origin main

            # Update backend
            cd server
            npm install --omit=dev
            pm2 restart server-backend --update-env || pm2 start server.js --name server-backend
            pm2 save

            # Update and rebuild frontend
            cd ../client
            npm install
            # Empty URL keeps frontend API calls relative (/api) for Nginx proxy.
            printf "VITE_BACKEND_URL=\n" > .env.production
            npm run build

            echo "Deployment complete"
